<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yono Games Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0a7f3f;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:20px;
display:flex;
align-items:center;
gap:20px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.card img{
width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
}

.info{
flex:1;
}

.info h2{
margin-bottom:10px;
color:#222;
}

.info p{
margin:5px 0;
}

.btn{
display:inline-block;
margin-top:10px;
padding:12px 25px;
background:#0066ff;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
background:#004bcc;
}

footer{
text-align:center;
padding:20px;
color:#666;
}
</style>
</head>
